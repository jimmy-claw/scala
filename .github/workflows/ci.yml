name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        run: sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-remoteobjects-dev xvfb qml6-module-qtqml-workerscript qml6-module-qtquick qml6-module-qtquick-window qml6-module-qtquick-controls qml6-module-qttest
      - name: Build plugin
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
          cmake --build build -j4
      - name: Run tests
        run: cd build && ctest -V --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results.xml
      - name: Build standalone
        run: |
          cmake -B build-standalone -DBUILD_STANDALONE=ON
          cmake --build build-standalone -j4 --target scala_standalone
