name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        run: sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-remoteobjects-dev xvfb qml6-module-qtqml-workerscript qml6-module-qtquick qml6-module-qtquick-window qml6-module-qtquick-controls qml6-module-qtquick-layouts qml6-module-qttest qt6-tools-dev
      - name: Build plugin
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
          cmake --build build -j4
      - name: Run tests
        run: cd build && ctest -V --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results.xml
      - name: Build standalone
        run: |
          cmake -B build-standalone -DBUILD_STANDALONE=ON
          cmake --build build-standalone -j4 --target scala_standalone

  e2e:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Install Qt6
        run: sudo apt-get install -y qt6-base-dev qt6-remoteobjects-dev
      - name: Build logoscore + modules via Nix
        run: |
          nix --extra-experimental-features 'nix-command flakes' build github:logos-co/logos-liblogos -o tools/logoscore || true
          # If nix build worked, set up merged dirs and build module
          if [ -f tools/logoscore/bin/logoscore ]; then
            export LOGOSCORE=tools/logoscore/bin/logoscore
            make setup-kv-module
            make build-module
          else
            echo "::warning::logoscore not available — skipping e2e"
            exit 0
          fi
      - name: Run e2e tests
        if: success()
        run: bash tools/e2e-test.sh
        timeout-minutes: 5
