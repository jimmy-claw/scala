name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        run: sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-remoteobjects-dev xvfb qml6-module-qtqml-workerscript qml6-module-qtquick qml6-module-qtquick-window qml6-module-qtquick-controls qml6-module-qtquick-layouts qml6-module-qttest qt6-tools-dev
      - name: Build plugin
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
          cmake --build build -j4
      - name: Run tests
        run: cd build && ctest -V --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results.xml
      - name: Build standalone
        run: |
          cmake -B build-standalone -DBUILD_STANDALONE=ON
          cmake --build build-standalone -j4 --target scala_standalone

  e2e:
    name: "E2E (requires Logos Core runtime)"
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true   # logoscore not available in public CI — informational only
    steps:
      - uses: actions/checkout@v4

      - name: Check for logoscore
        id: check
        run: |
          # logoscore is a private Logos Core binary — not available in public CI.
          # To run e2e locally: bash tools/e2e-test.sh
          # To run e2e in private CI: set LOGOSCORE env var or provide via artifact.
          if command -v logoscore &>/dev/null; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::notice::logoscore not available — e2e tests skipped."
            echo "::notice::Run locally with: bash tools/e2e-test.sh"
          fi

      - name: Install Qt6 (for module build)
        if: steps.check.outputs.found == 'true'
        run: sudo apt-get install -y qt6-base-dev qt6-remoteobjects-dev

      - name: Build scala_module
        if: steps.check.outputs.found == 'true'
        run: make build-module

      - name: Run e2e tests
        if: steps.check.outputs.found == 'true'
        run: |
          echo "Running scala_module end-to-end tests..."
          bash tools/e2e-test.sh
        timeout-minutes: 5
        env:
          SCALA_E2E_TIMEOUT: "90"
